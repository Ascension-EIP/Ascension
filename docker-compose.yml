services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minIO
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: rabbitMQ
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file: .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql:
    image: postgres:18
    container_name: postgreSQL
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql

  ai-worker:
    build: ./apps/ai
    container_name: aiWorker
    profiles:
      - prod
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
  rabbitmq_data:
