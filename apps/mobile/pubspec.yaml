name: mobile
description: "Ascension — Biomechanical analysis and intelligent climbing tracking app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  image_picker: ^1.1.2
  video_player: ^2.11.1
  http: ^1.2.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  equatable: ^2.0.8
  go_router: ^17.2.2
  just_audio: ^0.10.5
  flutter_markdown: ^0.7.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
