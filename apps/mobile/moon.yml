$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'dart'

project:
  name: 'mobile'
  description: 'Flutter mobile app for Ascension'

tasks:
  install:
    command: 'flutter'
    args: ['pub', 'get']
    inputs:
      - 'pubspec.yaml'
      - 'pubspec.lock'

  build-android:
    command: 'flutter'
    args: ['build', 'apk']
    deps:
      - 'install'

  # Build APK with backend URL pointing to the host machine (real device).
  # Override BACKEND_URL env var to change the IP, e.g.:
  #   BACKEND_URL=http://192.168.1.42:8080 moon run mobile:build-android-dev
  build-android-dev:
    command: 'flutter'
    args:
      - 'build'
      - 'apk'
      - '--dart-define=BACKEND_URL=http://${BACKEND_IP:-192.168.1.42}:8080'
    deps:
      - 'install'
    env:
      BACKEND_IP: '192.168.1.42'

  build-ios:
    command: 'flutter'
    args: ['build', 'ios', '--no-codesign']
    deps:
      - 'install'
    options:
      runInCI: true

  dev:
    command: 'flutter'
    args: ['run']
    deps:
      - 'install'
    options:
      envFile: true

  test:
    command: 'flutter'
    args: ['test']
    deps:
      - 'install'

  lint:
    command: 'flutter'
    args: ['analyze']
    deps:
      - 'install'

  format:
    command: 'dart'
    args: ['format', '--set-exit-if-changed', '.']
    deps:
      - 'install'
