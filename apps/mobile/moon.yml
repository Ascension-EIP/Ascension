$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'dart'

project:
  name: 'mobile'
  description: 'Flutter mobile app for Ascension'

tasks:
  install:
    command: 'flutter'
    args: ['pub', 'get']
    inputs:
      - 'pubspec.yaml'
      - 'pubspec.lock'
    deps:
      - 'root:setup-git-config'

  build-android:
    command: 'flutter'
    args: ['build', 'apk', '--dart-define=BACKEND_URL=${BACKEND_URL}']
    deps:
      - 'install'
    options:
      envFile: true

  build-ios:
    command: 'flutter'
    args: ['build', 'ios', '--no-codesign', '--dart-define=BACKEND_URL=${BACKEND_URL}']
    deps:
      - 'install'
    options:
      envFile: true

  build:
    command: 'bash'
    args: ['scripts/build.sh']
    deps:
      - 'install'
    options:
      envFile: true

  dev:
    command: 'flutter'
    args: ['run', '--dart-define=BACKEND_URL=${BACKEND_URL}']
    deps:
      - 'install'
    options:
      envFile: true

  test:
    command: 'flutter'
    args: ['test']
    deps:
      - 'install'

  lint:
    command: 'flutter'
    args: ['analyze']
    deps:
      - 'install'

  format:
    command: 'dart'
    args: ['format', '--set-exit-if-changed', '.']
    deps:
      - 'install'
