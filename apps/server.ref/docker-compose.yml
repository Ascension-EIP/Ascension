services:
  postgres:
    image: postgres:16
    container_name: go-backend-base-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: go-backend-base-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: db
      DB_USER: user
      DB_PASS: password
      GIN_MODE: debug
    ports:
      - "8080:8080"

volumes:
  postgres_data:
