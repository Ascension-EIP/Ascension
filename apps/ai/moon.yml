$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'python'

project:
  name: 'ai'
  description: 'AI service for Ascension'

tasks:
  setup:
    command: '$CONDA_EXE'
    args: ['env', 'create', '--file', 'environment.yml', "-p", "./ai-env"]
    inputs:
      - 'environment.yml'
      - 'pyproject.toml'

  download-model:
    command: 'bash'
    args:
      - '-c'
      - |
        if [ ! -f "pose_landmarker.task" ]; then
          echo "Downloading pose_landmarker.task model..."
          curl -fsSL -o pose_landmarker.task \
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/latest/pose_landmarker_heavy.task"
          echo "Download complete."
        else
          echo "pose_landmarker.task already present, skipping download."
        fi
    outputs:
      - 'pose_landmarker.task'

  install:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-e', '.[dev]']
    inputs:
      - 'pyproject.toml'
    deps:
      - 'setup'
      - 'download-model'

  dev:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'python', '-u', 'src/consumer.py']
    deps:
      - 'install'
    env:
      LOG_LEVEL: 'debug'
      PYTHONUNBUFFERED: '1'
    options:
      envFile: true

  build:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'build']
    deps:
      - 'install'

  lint:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'ruff', 'check', 'src']
    deps:
      - 'install'

  test:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'pytest', '-p', 'no:cacheprovider']
    deps:
      - 'install'
    options:
      allowFailure: true

  format:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'black', 'src']
    deps:
      - 'install'

