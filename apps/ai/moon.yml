$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'python'

project:
  name: 'ai'
  description: 'AI service for Ascension'

tasks:
  setup:
    command: '$CONDA_EXE'
    args: ['env', 'create', '--file', 'environment.yml', "-p", "./ai-env"]
    inputs:
      - 'environment.yml'
      - 'pyproject.toml'
    deps:
      - 'root:setup-git-config'

  download-model:
    command: 'bash'
    args: ['scripts/download-model.sh']
    outputs:
      - 'pose_landmarker.task'

  install_torch:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-r', 'requirements/torch.txt']
    inputs:
      - 'requirements/torch.txt'
    deps:
      - 'setup'
      - 'download-model'

  install_base:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-r', 'requirements/base.txt', '-r', 'requirements/app.txt']
    inputs:
      - 'requirements/base.txt'
      - 'requirements/app.txt'
    deps:
      - 'install_torch'

  install_detectron2:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '--no-build-isolation', '--no-deps', '-r', 'requirements/detectron2.txt']
    inputs:
      - 'requirements/detectron2.txt'
    deps:
      - 'install_base'

  install_moge:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-r', 'requirements/moge.txt']
    inputs:
      - 'requirements/moge.txt'
    deps:
      - 'install_detectron2'

  install_dev:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-r', 'requirements/dev.txt']
    inputs:
      - 'requirements/dev.txt'
    deps:
      - 'install_moge'

  install:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '--no-deps', '-e', '.']
    inputs:
      - 'pyproject.toml'
      - 'consumer.py'
      - 'pose_analysis.py'
    deps:
      - 'install_dev'

  dev:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'python', '-u', 'src/consumer.py']
    deps:
      - 'install'
    env:
      LOG_LEVEL: 'debug'
      PYTHONUNBUFFERED: '1'
    options:
      envFile: true

  build:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'build']
    deps:
      - 'install'

  lint:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'ruff', 'check', 'src']
    deps:
      - 'install'

  test:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'pytest', '-p', 'no:cacheprovider']
    deps:
      - 'install'
    options:
      allowFailure: true

  format:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'black', 'src']
    deps:
      - 'install'

