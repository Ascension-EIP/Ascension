$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'python'

project:
  name: 'ai'
  description: 'AI service for Ascension'

tasks:
  setup:
    command: '$CONDA_EXE'
    args: ['env', 'create', '--file', 'environment.yml', "-p", "./ai-env"]
    inputs:
      - 'environment.yml'
      - 'pyproject.toml'

  install:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'pip', 'install', '-e', '.[dev]']
    inputs:
      - 'pyproject.toml'
    deps:
      - 'setup'

  dev:
    command: '$CONDA_EXE'
    args: ['run', '--no-capture-output', '--prefix', './ai-env', 'python', '-u', 'src/consumer.py']
    deps:
      - 'install'
    env:
      LOG_LEVEL: 'debug'
      PYTHONUNBUFFERED: '1'
    options:
      envFile: true

  build:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'python', '-m', 'build']
    deps:
      - 'install'

  lint:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'ruff', 'check', 'src']
    deps:
      - 'install'

  test:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'pytest', '-p', 'no:cacheprovider']
    deps:
      - 'install'
    options:
      allowFailure: true

  format:
    command: '$CONDA_EXE'
    args: ['run', '--prefix', './ai-env', 'black', 'src']
    deps:
      - 'install'

