[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ascension-ai"
version = "1.0.0"
description = "AI component for Ascension EIP"
requires-python = ">=3.11"
dependencies = [
    "black>=23.3.0,<24",
    "boto3>=1.34,<2",
    "matplotlib==3.10.8",
    "mediapipe==0.10.32",
    "numpy==2.4.3",
    "opencv-contrib-python==4.13.0.92",
    "opencv-python==4.13.0.92",
    "pika>=1.3,<2",
    "psycopg2-binary>=2.9,<3",
    "python-dotenv>=1.0,<2",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.9,<1",
    "pytest>=8,<10",
    "build>=1,<2",
]

[project.scripts]
ascension-worker = "consumer:main"

[tool.setuptools]
py-modules = ["consumer", "main", "pose_analysis"]

[tool.ruff]
exclude = ["venv"]

[tool.black]
line-length = 80
target-version = ["py311"]
include = '\.pyi?$'
